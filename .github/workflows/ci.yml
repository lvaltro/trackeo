name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ��── Backend tests (blocking) ─────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Fake values — tests mock Supabase, no real connection needed
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key

  # ─── Frontend lint (informational — non-blocking) ────────────────────────
  lint-frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO: fix 69 pre-existing no-unused-vars errors

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
